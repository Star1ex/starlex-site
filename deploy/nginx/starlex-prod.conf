# /etc/nginx/sites-available/starlex-prod
#
# Serves the Starlex React SPA as static files and proxies the API/uploads to
# the backend container (127.0.0.1:8084). Sits behind the existing Cloudflare
# Tunnel: cloudflared -> localhost:80 -> this server block.
#
# Reuses rate-limit zones declared in the http{} block of /etc/nginx/nginx.conf
# (api_prod, frontend, conn_limit). Enable with:
#   sudo ln -s /etc/nginx/sites-available/starlex-prod /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name starlex.cc www.starlex.cc;

    # Static SPA bundle uploaded by CI
    root /opt/starlex/prod/frontend;
    index index.html;

    limit_conn conn_limit 20;

    # ─── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https: wss:;" always;

    # ─── API ──────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_prod burst=40 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8084;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }

    # ─── User uploads (served by backend's app.Static) ────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 10M;
    }

    # ─── Hashed static assets: cache hard ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        try_files $uri =404;
    }

    # ─── HTML: never cache, so new deploys take effect immediately ────────────
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ─── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        limit_req zone=frontend burst=50 nodelay;
        try_files $uri $uri/ /index.html;
    }
}
