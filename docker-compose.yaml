services:
  db:
    image: postgres:latest
    container_name: team-track-site-db
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      POSTGRES_USER: team_admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: team_track
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: team-track-site-backend-image
    container_name: team-track-site-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:3000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./react-frontend
      dockerfile: Dockerfile
    image: team-track-site-frontend-image 
    container_name: team-track-site-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: