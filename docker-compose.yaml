# CHANGE .ENV.EXAMPLE TO .ENV IN BOTH FOLDERS BEFORE RUNNING

services:
  db:
    image: postgres:latest
    container_name: team-track-site-db
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    user: "0:0"
    command: >
      sh -c "chown -R postgres:postgres /var/lib/postgresql &&
             exec /usr/local/bin/docker-entrypoint.sh postgres"
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: team-track-site-backend-image
    container_name: team-track-site-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:3000"
    env_file:
      - backend/.env
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./react-frontend
      dockerfile: Dockerfile
    image: team-track-site-frontend-image 
    container_name: team-track-site-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data: