services:
  db:
    image: postgres:16-alpine
    container_name: team-track-site-db
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      POSTGRES_USER: ${DB_USER:-team_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
      POSTGRES_DB: ${DB_NAME:-team_track}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-team_admin} -d ${DB_NAME:-team_track}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: team-track-site-backend-image
    container_name: team-track-site-backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    env_file:
      - backend/.env
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  frontend:
    build:
      context: ./react-frontend
      dockerfile: Dockerfile
    image: team-track-site-frontend-image 
    container_name: team-track-site-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:80"  # keep local dev access
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - uploads_data:/usr/share/nginx/html/uploads:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
