version: '3.9'

services:
  db:
    image: postgres:16
    container_name: teamtrack_postgres
    restart: always
    environment:
      POSTGRES_USER: team_admin
      POSTGRES_PASSWORD: 4321
      POSTGRES_DB: team_track
    ports:
      - "6333:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
