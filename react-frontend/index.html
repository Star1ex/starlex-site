<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="app-favicon" rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)" />
    <script>
      (function () {
        try {
          var cookieMatch = document.cookie.match(/(?:^|;\s*)starlex-theme=([^;]+)/);
          var storedTheme = localStorage.getItem('starlex-theme');
          var theme = cookieMatch ? decodeURIComponent(cookieMatch[1]) : storedTheme;
          if (!/^(dark|light|ultra-dark|solarized)$/.test(theme || '')) {
            theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          }

          var root = document.documentElement;
          root.classList.remove('dark', 'light', 'theme-ultra-dark', 'theme-solarized');
          if (theme === 'dark') root.classList.add('dark');
          if (theme === 'light') root.classList.add('light');
          if (theme === 'ultra-dark') root.classList.add('dark', 'theme-ultra-dark');
          if (theme === 'solarized') root.classList.add('theme-solarized');
        } catch (error) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <title>Starlex</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
